name: wit

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.1
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Etc/UTC}"
      WEBUI_PORT: "${QBITTORRENT_PORT:-8080}"
    volumes:
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/config/qbittorrent"
        target: /config
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/downloads"
        target: /downloads
    ports:
      - "127.0.0.1:${QBITTORRENT_PORT:-8080}:${QBITTORRENT_PORT:-8080}"
    networks:
      - internal
      - egress

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.16
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Etc/UTC}"
    volumes:
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/config/sonarr"
        target: /config
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/downloads"
        target: /downloads
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/television"
        target: /tv
    ports:
      - "127.0.0.1:${SONARR_PORT:-8989}:8989"
    networks:
      - internal
      - egress

  jellyfin:
    image: jellyfin/jellyfin:10.11.11
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      TZ: "${TZ:-Etc/UTC}"
    volumes:
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/config/jellyfin"
        target: /config
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/cache/jellyfin"
        target: /cache
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/television"
        target: /tv
        read_only: true
    ports:
      - "127.0.0.1:${JELLYFIN_PORT:-8096}:8096"
    networks:
      - internal
      - egress

networks:
  internal:
    name: wit-internal
    driver: bridge
    internal: true
  egress:
    name: wit-egress
    driver: bridge
