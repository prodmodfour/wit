name: wit

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - --show-error
        - --location
        - --output
        - /dev/null
        - "http://127.0.0.1:${QBITTORRENT_PORT:-8080}/"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Etc/UTC}"
      WEBUI_PORT: "${QBITTORRENT_PORT:-8080}"
    volumes:
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/config/qbittorrent"
        target: /config
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/downloads"
        target: /downloads
    ports:
      - "127.0.0.1:${QBITTORRENT_PORT:-8080}:${QBITTORRENT_PORT:-8080}"
    networks:
      - internal
      - egress

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.16
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - --show-error
        - --location
        - --output
        - /dev/null
        - http://127.0.0.1:8989/ping
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      qbittorrent:
        condition: service_healthy
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Etc/UTC}"
    volumes:
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/config/sonarr"
        target: /config
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/downloads"
        target: /downloads
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/television"
        target: /tv
    ports:
      - "127.0.0.1:${SONARR_PORT:-8989}:8989"
    networks:
      - internal
      - egress

  jellyfin:
    image: jellyfin/jellyfin:10.11.11
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - --show-error
        - --location
        - --output
        - /dev/null
        - http://127.0.0.1:8096/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      TZ: "${TZ:-Etc/UTC}"
    volumes:
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/config/jellyfin"
        target: /config
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/cache/jellyfin"
        target: /cache
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/television"
        target: /tv
        read_only: true
    ports:
      - "127.0.0.1:${JELLYFIN_PORT:-8096}:8096"
    networks:
      - internal
      - egress

  seerr:
    image: ghcr.io/seerr-team/seerr:v3.3.0
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://127.0.0.1:5055/api/v1/settings/public
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      jellyfin:
        condition: service_healthy
      sonarr:
        condition: service_healthy
    init: true
    environment:
      TZ: "${TZ:-Etc/UTC}"
    volumes:
      - type: bind
        source: "${WIT_DATA_ROOT:-./data}/config/seerr"
        target: /app/config
    ports:
      - "127.0.0.1:${SEERR_PORT:-5055}:5055"
    networks:
      - internal
      - egress

networks:
  internal:
    name: wit-internal
    driver: bridge
    internal: true
  egress:
    name: wit-egress
    driver: bridge
