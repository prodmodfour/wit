name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-scaffold:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check shell syntax
        run: |
          while IFS= read -r script; do
            bash -n "$script"
          done < <(find scripts -type f -name '*.sh' | sort)

      - name: Run quality gate
        run: bash scripts/quality-gate.sh

      - name: Verify template is customised for Wit
        run: |
          grep -Eq '^TEMPLATE_CUSTOMISED:[[:space:]]*true[[:space:]]*$' PROJECT_BRIEF.md

      - name: Verify autonomous queue is configured
        run: |
          grep -Eq '^AUTOMATION_STATUS:[[:space:]]*NOT_DONE[[:space:]]*$' BUILD_TICKETS.md
          grep -Eq '^Status:[[:space:]]*TODO[[:space:]]*$' BUILD_TICKETS.md
