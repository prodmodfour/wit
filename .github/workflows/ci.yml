name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.2"
          enable-cache: true

      - name: Verify template is customised for Wit
        run: grep -Eq '^TEMPLATE_CUSTOMISED:[[:space:]]*true[[:space:]]*$' PROJECT_BRIEF.md

      - name: Run the repository quality gate
        run: bash scripts/quality-gate.sh
